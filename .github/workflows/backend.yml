name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: expenseaudit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ./backend/ExpenseAudit.Api/ExpenseAudit.Api.csproj

      - name: Build
        run: dotnet build ./backend/ExpenseAudit.Api/ExpenseAudit.Api.csproj --no-restore

      - name: Run migrations
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=expenseaudit;Username=postgres;Password=postgres"
          Jwt__Secret: "ci-secret-key-min-32-characters-long!!"
          Jwt__Issuer: "ExpenseAuditApi"
          Jwt__Audience: "ExpenseAuditClient"
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.0
          dotnet ef database update --project ./backend/ExpenseAudit.Api/ExpenseAudit.Api.csproj